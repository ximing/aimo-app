name: Build and Release Android

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🏗 Checkout repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔧 Prebuild Android (generate native project)
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: 🔑 Restore keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/aimo-release.keystore
          ls -lh android/app/aimo-release.keystore

      - name: 🔑 Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: ⚙️ Configure JVM memory for Gradle
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties

      - name: 🏗 Build signed Android APK (Release)
        working-directory: android
        env:
          KEYSTORE_PATH: app/aimo-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/app/aimo-release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: 📋 Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: 🔍 Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: 🐍 Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          ./aws/install
          aws --version

      - name: ✍️ Rename APK
        run: |
          cp "${{ steps.apk.outputs.apk_path }}" app-release.apk
          ls -lh app-release.apk

      - name: 📄 Generate latest.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CREATE_TIME=$(date +%s%3N)
          cat > latest.json <<EOF
          {"version":"$VERSION","releaseDate":$CREATE_TIME,"path":"app-release.apk"}
          EOF
          cat latest.json

      - name: 🚀 Create GitHub Release and Upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}-${{ github.run_number }}"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "🤖 Android APK built via GitHub Actions (signed release build)" \
            app-release.apk \
            latest.json

      - name: ☁️ Upload to MinIO (S3)
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          # Configure AWS CLI for MinIO
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID" --profile minio
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY" --profile minio
          aws configure set region us-east-1 --profile minio
          aws configure set signature_version s3v4 --profile minio

          VERSION=$(node -p "require('./package.json').version")
          BUILD_NUM=${{ github.run_number }}
          DIST_PATH="${VERSION}-${BUILD_NUM}"

          # Upload APK to versioned directory
          aws s3 cp app-release.apk s3://${{ secrets.MINIO_BUCKET }}/${DIST_PATH}/app-release.apk \
            --profile minio \
            --endpoint-url https://${{ secrets.MINIO_ENDPOINT }} \
            --acl public-read

          # Upload latest.json to root
          aws s3 cp latest.json s3://${{ secrets.MINIO_BUCKET }}/latest.json \
            --profile minio \
            --endpoint-url https://${{ secrets.MINIO_ENDPOINT }} \
            --acl public-read

          echo "✅ Uploaded to MinIO:"
          echo "   - ${DIST_PATH}/app-release.apk"
          echo "   - latest.json"
          echo "   URL: https://${{ secrets.MINIO_BUCKET }}.${{ secrets.MINIO_ENDPOINT }}/${DIST_PATH}/app-release.apk"

      - name: 🧹 Clean up keystore
        if: always()
        run: rm -f android/app/aimo-release.keystore

      - name: 📦 Build Summary
        if: always()
        run: |
          echo "✅ Build completed!"
          echo "🏷️  Tag: v${{ steps.version.outputs.version }}-${{ github.run_number }}"
          echo "📦 Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}-${{ github.run_number }}"
