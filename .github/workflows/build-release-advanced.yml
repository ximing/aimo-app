name: Build and Release Android

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🏗 Checkout repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: npm

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔧 Prebuild Android (generate native project)
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: 🔑 Restore keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/aimo-release.keystore
          ls -lh android/app/aimo-release.keystore

      - name: 🔑 Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: 🏗 Build signed Android APK (Release)
        working-directory: android
        env:
          KEYSTORE_PATH: app/aimo-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/app/aimo-release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: 📋 Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: 🔍 Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: ✍️ Rename APK
        run: |
          cp "${{ steps.apk.outputs.apk_path }}" app-release.apk
          ls -lh app-release.apk

      - name: 📄 Generate latest.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CREATE_TIME=$(date +%s%3N)
          cat > latest.json <<EOF
          {"version":"$VERSION","releaseDate":$CREATE_TIME,"path":"app-release.apk"}
          EOF
          cat latest.json

      - name: 🚀 Create GitHub Release and Upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}-${{ github.run_number }}"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "🤖 Android APK built via GitHub Actions (signed release build)" \
            app-release.apk \
            latest.json

      - name: 🧹 Clean up keystore
        if: always()
        run: rm -f android/app/aimo-release.keystore

      - name: 📦 Build Summary
        if: always()
        run: |
          echo "✅ Build completed!"
          echo "🏷️  Tag: v${{ steps.version.outputs.version }}-${{ github.run_number }}"
          echo "📦 Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}-${{ github.run_number }}"
